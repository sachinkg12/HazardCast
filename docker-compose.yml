services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hazardcast
      POSTGRES_USER: hazardcast
      POSTGRES_PASSWORD: hazardcast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  pgdata:
